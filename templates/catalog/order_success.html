{% extends 'base.html' %}

{% block title %}Заказ оформлен - BarMan Shop{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card">
                <div class="card-body">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                    <h2 class="mt-3">Спасибо за заказ!</h2>
                    <p class="lead">Мы получили вашу заявку и скоро свяжемся с вами для уточнения деталей.</p>
                    <hr>
                    <p>Наш менеджер свяжется с вами в ближайшее время.</p>
                    <a href="{% url 'home' %}" class="btn btn-primary mt-3">
                        <i class="bi bi-house"></i> Вернуться на главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
